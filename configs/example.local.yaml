runtime:
  project_root: .
  scratch_root: ./.runtime/scratch
  logs_root: ./.runtime/logs
  cleanup_scratch_after_mlflow_log: false

dataset:
  images_dir: ./data/prepared_images/kanopus
  scenes_file: ./data/MLMarkup/scenes.json
  annotation_file: ./data/MLMarkup/annotations.json
  val_fraction: 0.2

tile_preparation:
  tile_size: 512
  stride: 256
  num_workers: 16
  prefetch_factor: 2
  seed: 42
  augmentation_level: 0
  smart_tiling: false
  positive_factor: 0.5
  val_positive_factor: null

train:
  model_name: segformer_b2
  input_channels: 4
  output_channels: 1
  pretrained: false
  initial_checkpoint_uri: null
  epochs: 2
  batch_size: 2
  device: cpu
  learning_rate: 0.00001
  weight_decay: 0.0001
  loss: bce_dice
  focal_alpha: 0.6
  pos_weight: 1.0
  tversky_alpha: 0.4
  tversky_beta: 0.6
  threshold: 0.5
  early_stopping_patience: 2

inference:
  checkpoint_uri: ./checkpoints/latest.pt
  threshold: 0.5
  batch_size: 2
  device: cpu

mlflow:
  enabled: true
  tracking_uri: ./mlruns
  experiment_name: MLSystem2-local
