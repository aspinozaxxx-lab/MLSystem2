runtime:
  project_root: .
  scratch_root: ./.runtime/scratch
  logs_root: ./.runtime/logs
  cleanup_scratch_after_mlflow_log: false

dataset:
  images_dir: ./data/prepared_images/kanopus
  scenes_file: ./data/MLMarkup/scenes.json
  annotation_file: ./data/MLMarkup/annotations.json
  val_fraction: 0.2

tile_preparation:
  tile_size: 512
  stride: 256
  num_workers: 16
  prefetch_factor: 2
  seed: 42
  augmentation_level: 0

train:
  model_name: unet
  input_channels: 3
  output_channels: 1
  epochs: 2
  batch_size: 2
  device: cpu

inference:
  checkpoint_uri: ./checkpoints/latest.pt
  threshold: 0.5
  batch_size: 2
  device: cpu

mlflow:
  enabled: true
  tracking_uri: ./mlruns
  experiment_name: MLSystem2-local
