shared:
    model_name: &segm_model_name sentinel2-summer-swamp
    model_host: &segm_model_host models-serving.service.consul
    port: &port 18070


config:
    _class: Compose
    inputs:
        - input.tif
    outputs:
        - output.geojson
    blocks:
    -   name: SplitRaster
        optional: false
        inputs:
        - input.tif
        outputs:
        - B02.tif
        - B03.tif
        - B04.tif
        - B08.tif
        bricks:
        -   _class: SplitRaster
            input: input
            input_ext: tif
            output:
                - B02
                - B03
                - B04
                - B08
                - B8A
                - B11
                - B12
    -   name: ImgSub1000
        optional: true
        inputs:
        - B02.tif
        - B03.tif
        - B04.tif
        - B08.tif
        outputs:
        - B02.tif
        - B03.tif
        - B04.tif
        - B08.tif
        bricks:
        -   _class: AddConstant
            input_rasters:
                - B02
                - B03
                - B04
                - B08
            output_rasters:
                - B02_
                - B03_
                - B04_
                - B08_
            constant: -1000
            sample_size:
            - 5000
            - 5000
        - _class: AddConstant
          input_rasters:
              - B02_
              - B03_
              - B04_
              - B08_
          output_rasters:
              - B02
              - B03
              - B04
              - B08
          constant: 0
          sample_size:
              - 5000
              - 5000
    -   name: Segmentation
        optional: false
        inputs:
        - B02.tif
        - B03.tif
        - B04.tif
        - B08.tif
        outputs:
        - output.geojson
        bricks:
        -   _class: Segmentation
            bounds: 32
            adapter:
                _class: TritonAdapter
                host: *segm_model_host
                port: *port
                name: *segm_model_name
                use_batch_dim: false
                timeout: 60
                input_dtype: int16
            input_rasters:
            - B04
            - B03
            - B02
            - B08
            nodata: 0
            output_labels:
            - 'output'
            n_workers: 1
            sample_size:
            - 512
            - 512
            verbose: true
            bound_mode: drop
            padding: none
            nodata_mask_mode: false
        -   _class: VectorizeMasks
            input_rasters:
            - 'output'
    -   name: Postprocessing
        optional: false
        inputs:
        - output.geojson
        outputs:
        - output.geojson
        bricks:
        -   _class: UnifiedVectorProcessing
            input: output
            output: output
            crs: "utm"
            bricks:
            - _class: FilterSmallObjects
              min_area: 0
              area_tag: "area"
            - _class: AddAttributes
              add_processing_id: true
              add_timestamp: true
              attributes:
                    neural_network_type: 'sentinel-swamp'
                    neural_network_version: '1'
                    object_class: 'SWAMP'
    namespace: null
date: '2022-09-08'
version: 0.1.4
