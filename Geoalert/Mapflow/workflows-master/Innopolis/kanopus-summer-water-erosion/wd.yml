name: "Водная эрозия - НСПД-1"
price_per_sq_km: 0
partition_size: 0.5

blocks:
  - name: Segmentation
    price: 0
    optional: false
    default_enabled: true
    display_name: Сегментация
  - name: Simplification
    price: 0
    optional: true
    default_enabled: false
    display_name: Полигонизация
  - name: Postprocessing
    price: 0
    optional: false
    default_enabled: true
    display_name: Постобработка


version: 0
stages:
  select-source:
    description: Source selection
    action: select-source
    config:
      params:
        auto_confirm: true
        source_type: xyz
        zoom: 16
        projection: epsg:3857
  validate-source:
    description: Source validation
    action: validate-source
    dependsOn:
      - select-source
    config:
      params:
        requirements: requirements.yml
  load-data:
    description: Downloading data
    action: dataloader
    dependsOn:
    - validate-source
    config:
      retries: 1
      retry_interval: 60
      params:
        bucket: ml-workflow-data
        workers: 16
        buffer: 200m
        use_cache: true
  build-cog:
    description: Preparing imagery
    action: build-cog
    dependsOn:
    - load-data
    config:
      params:
        bucket: ml-rasters
        buffer: 10m
  inference:
    description: Detecting buildings
    action: inference
    dependsOn:
    - load-data
    config:
      buffer: 50m
      retries: 2
      retry_interval: 30
      params:
        pipeline: inference.yml
        bucket: ml-workflow-data
  import-vector:
    description: Saving results
    action: import-vector
    dependsOn:
    - inference
    config:
      params:
        crop_to_mask: true
        merge_strategy: NONE