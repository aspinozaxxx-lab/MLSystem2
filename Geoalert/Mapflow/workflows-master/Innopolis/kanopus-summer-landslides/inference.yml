shared:
    model_name: &segm_model_name kanopus-summer-landslides
    model_host: &segm_model_host models-serving.service.consul
    port: &port 18070

config:
    _class: Compose
    inputs:
        - input.tif
    outputs:
        - output.geojson
    blocks:
        -   name: Segmentation
            optional: false
            inputs:
                - input.tif
            outputs:
                - output.geojson
            bricks:
            - _class: SplitRaster
              input: input
              input_ext: tif
              output:
                  - RED
                  - GRN
                  - BLU
                  - NIR
            -   _class: Segmentation
                bounds: 0
                adapter:
                    _class: TritonAdapter
                    host: *segm_model_host
                    port: *port
                    name: *segm_model_name
                    use_batch_dim: false
                    timeout: 60
                    input_dtype: int16
                input_rasters:
                - RED
                - GRN
                - BLU
                - NIR
                nodata: 0
                output_labels:
                - 'output'
                n_workers: 1
                sample_size:
                - 512
                - 512
                verbose: true
                bound_mode: drop
                padding: none
                nodata_mask_mode: false
                vectorize: false
            -   _class: VectorizeMasks
                input_rasters:
                - 'output'
        -   name: Simplification
            optional: true
            inputs:
                - output.geojson
            outputs:
                - output.geojson
            bricks:
            -   _class: Simplify
                input: "output"
                crs: null
                rate: 0.0002
        -   name: Postprocessing
            optional: false
            inputs:
                - output.geojson
            outputs:
                - output.geojson
            bricks:
            -   _class: UnifiedVectorProcessing
                input: output
                output: output
                crs: "utm"
                bricks:
                  - _class: FilterSmallObjects
                    min_area: 0
                    area_tag: "area"
                  - _class: AddAttributes
                    add_processing_id: true
                    add_timestamp: true
                    attributes:
                          neural_network_type: 'kanopus-landslides'
                          neural_network_version: '1'
                          object_class: 'LANDSLIDES'

    namespace: null
date: '2022-09-08'
version: 0.1.4
