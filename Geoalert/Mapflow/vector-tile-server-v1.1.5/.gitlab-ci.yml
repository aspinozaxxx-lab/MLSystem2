image: registry.hub.nspd.rosreestr.gov.ru/nspd/geoalert/docker/dind-sbt:1.3.3

variables:
  GIT_DEPTH: 10
  SBT_OPTS: "-Dsbt.global.base=sbt-cache/sbtboot -Dsbt.boot.directory=sbt-cache/boot -Dsbt.ivy.home=sbt-cache/ivy"
  CACHE_FALLBACK_KEY: master
  DOCKER_AUTH_CONFIG: $CI_DOCKER_AUTH_CONFIG
  PROJ_NAME: ${CI_PROJECT_NAME}

stages:
  - test
  - publish
  - deploy

.tags: &tags
  - debug
  - docker

cache:
  key: $CI_COMMIT_REF_SLUG
  untracked: true
  paths:
    - "sbt-cache/ivy/cache"
    - "sbt-cache/boot"
    - "sbt-cache/sbtboot"
    - "sbt-cache/target"
    - "sbt-cache/coursier"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"
      variables:
        IMAGE_TAG: $CI_COMMIT_REF_NAME
    - when: always
      variables:
        IMAGE_TAG: $CI_COMMIT_REF_SLUG


test:
  stage: test
  tags: *tags
  script:
    - sbt test

publish-backend-image:
  stage: publish
  tags: *tags
  before_script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - VERSION=$IMAGE_TAG sbt -Dsbt.ivy.home=./.ivy docker:publish

deploy:
  stage: deploy
  image: $ALPINE_DOCKER_IMAGE
  script:
    - |
      curl -sSf -X POST \
        -F token= \
        -F ref=master \
        -F "variables[IMG_NAME]=${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}" \
        -F "variables[PROJ_NAME]=${PROJ_NAME}" \
        ${CI_API_V4_URL}/projects/199/trigger/pipeline > result.json \
      && id=$(jq -r '.id' result.json) \
      && status=$(jq -r '.status' result.json) \
      && url=$(jq -r '.web_url' result.json) \
      && echo "Pipeline $id $status, url: $url"
  rules:
    - if: '$CI_COMMIT_TAG != null'

