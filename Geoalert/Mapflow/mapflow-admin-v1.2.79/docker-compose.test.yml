version: "3.5"
services:
  nginx:
    image: white-maps-client:latest
    ports:
      - 33423:80
    environment:
      - APP_HOSTNAME=whitemaps.aeronetlab.space
  backend:
    image: registry.gitlab.com/geoalert-projects/white-maps-backend/white-maps-backend:${BACKEND_VERSION}
    depends_on:
      - database
    environment:
      - LOG_LEVEL=DEBUG
      - DB_HOST=database
      - DB_PORT=5432
      - TEST_ENV=true

  database:
    image: mdillon/postgis:11-alpine
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=
      - POSTGRES_USER=postgres
      - POSTGRES_DB=white-maps
    ports:
      - 5440:5432

volumes:
  database:
