load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_echo_module.so;
load_module modules/ngx_http_headers_more_filter_module.so;
load_module modules/ngx_http_xslt_filter_module.so;

worker_processes  auto;

# [ debug | info | notice | warn | error | crit | alert | emerg ]


worker_rlimit_nofile 16384;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    log_format file '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" $http_host $request_time $scheme "$sent_http_content_type"';

    access_log syslog:server=unix:/dev/log,facility=local7,severity=info,nohostname file;
    error_log syslog:server=unix:/dev/log,facility=local7,severity=info,nohostname notice;
    
    server {
        gzip on;
        gzip_disable "msie6";
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_buffers 16 8k;
        gzip_http_version 1.1;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        proxy_connect_timeout       300s;
        proxy_send_timeout          300s;
        proxy_read_timeout          300s;
        send_timeout                300s;
        client_max_body_size        10000M;

        listen 80 default_server;
        listen [::]:80 default_server ipv6only=on;

        server_name localhost;

        location / {
            alias /var/www/mapflow/html/;
            try_files $uri /index.html;
            expires -1y;
            add_header Pragma "no-cache";
            add_header Cache-Control "public";
        }

        location /static {
            alias /var/www/mapflow/html/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
