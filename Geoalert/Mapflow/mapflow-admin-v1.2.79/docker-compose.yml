version: "3.5"
services:
  backend:
    image: registry.gitlab.com/geoalert-projects/white-maps-platform/white-maps-backend/white-maps-backend:${BACKEND_VERSION}
    depends_on:
      - database
    environment:
      - LOG_LEVEL=DEBUG
      - DB_HOST=database
      - DB_PORT=5432
      - TEST_ENV=true
      - MOCK_WE=true
      - TEST_DATA=true
    ports:
      - 8800:8080
    volumes:
      - ./default_workflow_defs:/opt/docker/workflow_defs/

  database:
    image: mdillon/postgis:11-alpine
    volumes:
      - database:/var/lib/postgresql/data
    ports:
      - 5432:5432

    environment:
      - POSTGRES_PASSWORD=
      - POSTGRES_USER=postgres
      - POSTGRES_DB=white-maps
volumes:
  database:
