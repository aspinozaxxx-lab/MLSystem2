name: Buildings Detection With Heights
version: 0
price_per_sq_km: 3

stages:
  select-source:
    description: Source selection
    action: select-source
    config:
      params:
        auto_confirm: true
        source_type: xyz
        url: http://10.1.6.1:8800/api/tiles?proxy=true&url=http://mt0.google.com/vt/lyrs=s%26hl=en%26x={x}%26y={y}%26z={z}%26s=Ga
        zoom: 18
        projection: epsg:3857
  load-data:
    description: Downloading data
    action: dataloader
    dependsOn:
    - select-source
    config:
      retries: 1
      retry_interval: 60
      params:
        bucket: workflow-white-maps
        workers: 2
        buffer: 0.002
  user-input:
    description: Waiting for user input
    action: user-input
    dependsOn:
    - load-data
    config:
      params:
        bucket: workflow-white-maps
        inputs: meta.geojson,shadows_labels.geojson,walls_labels.geojson
        recipients: andrew090990@gmail.com,dev@geoalert.io
  inference:
    description: Detecting buildings
    action: inference
    dependsOn:
    - user-input
    config:
      retries: 3
      retry_interval: 30
      params:
        pipeline: buildings_instance_v002.yaml
        bucket: workflow-white-maps
  build-cog:
    description: Preparing imagery
    action: build-cog
    dependsOn:
    - load-data
    config:
      params:
        bucket: workflow-white-maps
  import-vector:
    description: Saving results
    action: import-vector
    dependsOn:
    - inference
    config:
      params:
        crop_to_mask: false