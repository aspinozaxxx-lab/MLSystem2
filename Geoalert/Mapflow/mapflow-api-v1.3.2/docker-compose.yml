version: "3.5"
services:
  backend:
    build: .
    depends_on:
      - database
    volumes:
      - sbt-cache:/root/.ivy2
      - sbt:/root/.sbt
    ports:
      - 8800:8080
    environment:
      - WORKFLOW_ENGINE_URL=https://staging.aeronetlab.space:443
      - MINIO_URL=http://10.1.6.1:9000
      - LOG_LEVEL=DEBUG
      - DB_HOST=database
      - DB_PORT=5432
      - TEST_ENV=true

  database:
    image: mdillon/postgis:11-alpine
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=
      - POSTGRES_USER=postgres
      - POSTGRES_DB=mapflow
    ports:
      - 5432:5432

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - 5050:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=user@geolaert.io
      - PGADMIN_DEFAULT_PASSWORD=
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json

volumes:
  database:
  sbt-cache:
  sbt:
