version: "3.5"

x-common-minio-variables: &common-minio-variables
  MINIO_HOST: minio
  MINIO_PORT: 9000
  MINIO_ACCESS_KEY: 
  MINIO_SECRET_KEY: 

services:
  database:
    container_name: we_database
    image: postgis/postgis:14-3.3
    volumes:
      - ./src/main/resources/db/migration/V001.0__init.sql:/docker-entrypoint-initdb.d/we_db_init.sql
    environment:
      - POSTGRES_PASSWORD=
      - POSTGRES_USER=postgres
      - POSTGRES_DB=engine_db
    ports:
      - 54321:5432

  minio:
    image: minio/minio
    command: server --address :9000 /data
    environment:
      <<: *common-minio-variables
    volumes:
      - minio-data:/data
      - minio-export:/export
    ports:
      - 9000:9000
      - 9001:9001

  queue:
    image: docker.io/bitnami/rabbitmq:3.11.9-debian-11-r1
    environment:
      RABBITMQ_HOST: "queue"
      RABBITMQ_NODE_PORT: "5672"
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "password"
    ports:
      - 15672:15672
      - 5672:5672

volumes:
  we_db: ~
  minio-data: ~
  minio-export: ~

configs:
  workflow-engine-db-config:
    file: ./db_init/we_db_init.sql
