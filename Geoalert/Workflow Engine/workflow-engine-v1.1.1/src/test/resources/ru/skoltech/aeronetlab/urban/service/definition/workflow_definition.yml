description: Default WD
name: 3fe8df14-71cc-446c-9073-adc6c2be0f13
stages:
  build-cog:
    action: build-cog
    config:
      params: {bucket: workflow-white-maps, buffer: 10m}
    dependsOn: [load-data]
    description: Preparing imagery
  import-vector:
    action: import-vector
    config:
      params: {crop_to_mask: true, key_properties: 'class_id, density', merge_strategy: SEMANTIC_SEGMENTATION}
    dependsOn: [inference]
    description: Saving results
  inference:
    action: inference
    config:
      params: {bucket: workflow-white-maps, pipeline: }
      retries: 2
      retry_interval: 30
    dependsOn: [load-data]
    description: Detecting buildings
  load-data:
    action: dataloader
    config:
      params: {bucket: workflow-white-maps, buffer: 100m, use_cache: true, workers: 16}
      retries: 1
      retry_interval: 60
    dependsOn: [validate-source]
    description: Downloading data
  validate-source:
    dependsOn: [select-source]
    action: validate-source
    config:
      params: {requirements: "e3ZlcnNpb246IDEuMCwgc291cmNlczoge3h5ejogeyByZWNvbW1lbmRlZDogeyBtaW5fem9vbTogMTcsIG1heF96b29tOiAxOCB9LCByZXF1aXJlZDogeyBtaW5fem9vbTogMTYsIG1heF96b29tOiAxOCB9" }
    description: Validating data source

  select-source:
    action: select-source
    config:
      params: {auto_confirm: true, projection: 'epsg:3857', source_type: xyz, url: 'https://api.tiles.mapbox.com/v4/mapbox.satellite/{z}/{x}/{y}.jpg?access_token=,
               zoom: 18}
    description: Source selection
version: 0
