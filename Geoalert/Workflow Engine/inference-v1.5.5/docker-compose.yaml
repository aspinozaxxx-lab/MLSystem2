version: '3.8'

x-common-minio-variables: &common-minio-variables
  MINIO_HOST: minio
  MINIO_ACCESS_KEY: 
  MINIO_SECRET_KEY: #
  MINIO_PORT: 9000

services:
  app:
    image: inference/test
    container_name: inference_test
    environment:
      <<: *common-minio-variables
      BUCKET_NAME: "healthcheck"
    depends_on:
        - minio

  minio:
    image: minio/minio:RELEASE.2022-06-20T23-13-45Z
    container_name: inference_minio
    command: server --console-address :9001 /data
    environment: *common-minio-variables