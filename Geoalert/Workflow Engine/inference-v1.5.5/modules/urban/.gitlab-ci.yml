image: python:3.7

.tags: &tags
  tags:
    - dind

test:
  stage: test
  script:
  - pip install -U sphinx && pip install sphinx_rtd_theme
  - pip install .
  - cd docs && make html && cd ..
  - mv docs/build/html public
  only:
  - branches
  except:
  - master
  <<: *tags

pages:
  stage: deploy
  script:
  - pip install -U sphinx && pip install sphinx_rtd_theme
  - pip install .
  - cd docs && make html && cd ..
  - mv docs/build/html public
  artifacts:
    paths:
    - public
  only:
  - master
  <<: *tags
