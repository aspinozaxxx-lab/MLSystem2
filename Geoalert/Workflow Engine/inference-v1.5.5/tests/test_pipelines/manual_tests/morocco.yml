    - _class: UnifiedVectorProcessing
      input: roofs
      output: roofs
      crs: utm
      bricks:
          - _class: FilterSmallObjects
            min_area: 30.0
          - _class: RemoveSmallHoles
            min_hole_area: 50.0
          # end: segmentation
          # begin: simplification [roofs.geojson] [roofs.geojson]
          - _class: SimplifyAsShape
            max_hausdorff: 7.0
            min_area: 0.0
            min_iou: 0.8
            n_workers: -1
            shape_type: RECTANGLE
            verbose: true
          - _class: SimplifyAsShape
            max_hausdorff: 7.0
            min_area: 0.0
            min_iou: 0.8
            n_workers: -1
            shape_type: L-SHAPE
            verbose: true
          - _class: SimplifyAsShape
            max_hausdorff: 7.0
            min_area: 200.0
            min_iou: 0.8
            n_workers: -1
            shape_type: RECTANGLE
            verbose: true
          - _class: SimplifyAsShape
            max_hausdorff: 7.0
            min_area: 0.0
            min_iou: 0.8
            n_workers: -1
            shape_type: GRID_SNAP
            verbose: true
          - _class: Simplify
            rate: 2.0
          - _class: CorrectTopology
            distance_step: 1.0

    -   _class: InstanceSeparation
        input: roofs
        markers: markers
        output: roofs
        ids_tag: _block_id

