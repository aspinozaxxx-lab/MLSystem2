    -   name: Heights
        optional: false
        inputs:
        - 100.geojson
        - meta.geojson
        outputs:
        - 100.geojson
        bricks:
        - _class: ComputeMetaAngles
          meta: meta
          output: meta
          shadows: shadows_labels
          walls: walls_labels
        - _class: MeasureHeight
          n_workers: 1
          meta: meta
          output: '100'
          roofs: '100'
          shadows: '901'
          walls: '902'
          sw_height: _sw_height
        # we save footprints in place of rooftops,
        # and afterwards do the same for footprints in case of buildingsHeights
        # or roofs in case this stage is skipped
